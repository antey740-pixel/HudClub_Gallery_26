<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Людмила</title>
    <!-- Fancybox 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: #ddd; margin: 0; padding: 0; }
        
        .container { width: 98%; max-width: 1600px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .header-nav { 
            position: sticky; top: 0; background: rgba(20, 20, 20, 0.95); 
            backdrop-filter: blur(10px); border-bottom: 1px solid #333; 
            z-index: 1000; padding: 15px 0; text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn { 
            display: inline-block; color: #fff; text-decoration: none; background: #222; 
            padding: 10px 25px; border-radius: 30px; margin: 0 5px; font-weight: 500;
            border: 1px solid #444; transition: all 0.1s ease; font-size: 14px; cursor: pointer;
        }
        .btn:hover { background: #00d4ff; border-color: #00d4ff; color: #000; }
        .btn-active { background: #ffcc00; color: #000; border: none; }
        .btn-review {
            background: #8b0000;
            border-color: #ff4444;
        }
        .btn-review:hover {
            background: #ff0000;
            border-color: #ff0000;
        }
        .btn-review.active {
            background: #ffcc00;
            color: #000;
            border-color: #ffcc00;
        }

        h1 { text-align: center; margin-top: 30px; color: #fff; font-weight: 300; }
        h2 { color: #ffcc00; border-left: 4px solid #ffcc00; padding-left: 15px; margin: 40px 0 15px 0; font-size: 1.3rem; clear: both; }
        
        .user-list { list-style: none; padding: 0; margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .user-item { background: #161616; border-radius: 12px; border: 1px solid #222; transition: 0.1s; }
        .user-item:hover { background: #222; border-color: #00d4ff; transform: translateX(5px); }
        .user-link { display: flex; align-items: center; padding: 15px 20px; color: #00d4ff; text-decoration: none; font-size: 1.1rem; }
        .list-num { background: #ffcc00; color: #000; font-weight: bold; width: 34px; height: 34px; 
                     display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: 15px; flex-shrink: 0; }

        .gallery { 
            display: grid !important; 
            grid-template-columns: repeat(auto-fit, 450px) !important; 
            justify-content: center !important;
            gap: 15px !important; 
            margin-bottom: 30px;
            width: 100%;
        }
        .gallery-item { border-radius: 10px; overflow: hidden; border: 1px solid #222; background: #000; }
        .gallery-item img { width: 100%; height: auto; display: block; cursor: pointer; transition: 0.2s; }
        .gallery-item:hover img { opacity: 0.8; transform: scale(1.03); }

        /* Canvas для рисования */
        #review-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 99999; 
            display: none; 
            cursor: crosshair; 
            touch-action: none;
            background: transparent !important;
            pointer-events: none;
        }
        #review-canvas.active {
            display: block !important;
            pointer-events: auto;
            background: transparent !important;
        }
        
        #review-tools { 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100000; 
            background: rgba(0,0,0,0.9); 
            padding: 10px 25px; 
            border-radius: 50px; 
            display: none; 
            gap: 15px; 
            align-items: center; 
            border: 2px solid #ffcc00; 
        }
        .color-dot { width: 25px; height: 25px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        .dot-white { background: #fff; } .dot-black { background: #000; } .dot-red { background: #f00; }
        .btn-clear { background: #444; color: #fff; border: none; padding: 5px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
        .btn-exit { background: #8b0000; border-color: #ff4444; }
        .btn-exit:hover { background: #ff0000; }
    </style>
</head>
<body>
    <div class="header-nav">
        <a href="index.html" class="btn ">🏠 ГЛАВНАЯ</a>
        <a href="all_photos.html" class="btn ">🖼️ ВСЕ ФОТО (ВЫСТАВКА)</a>
        <button id="reviewToggleBtn" class="btn btn-review">✏️ РЕЖИМ РАЗБОРА</button>
    </div>
    <canvas id="review-canvas"></canvas>
    <div id="review-tools">
        <div class="color-dot dot-white" onclick="setStroke('#fff')"></div>
        <div class="color-dot dot-black" onclick="setStroke('#000')"></div>
        <div class="color-dot dot-red" onclick="setStroke('#f00')"></div>
        <button class="btn-clear" onclick="clearCanvas()">ОЧИСТИТЬ</button>
        <button class="btn-clear btn-exit" onclick="toggleReview()">ВЫЙТИ</button>
        <span style="color:#ffcc00; font-size:11px; margin-left:10px;">РЕЖИМ РАЗБОРА</span>
    </div>
<div class="container">
<h1>46. Людмила</h1><div class='gallery'><div class="gallery-item"><a href="assets/user5683728772/p_0.jpg" data-fancybox="uuser5683728772" data-caption="Людмила"><img src="assets/user5683728772/p_0.jpg" loading="lazy"></a></div></div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        const canvas = document.getElementById('review-canvas');
        const ctx = canvas.getContext('2d');
        const tools = document.getElementById('review-tools');
        const toggleBtn = document.getElementById('reviewToggleBtn');
        let isDrawing = false;
        let active = false;

        function setStroke(c) { ctx.strokeStyle = c; }
        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function toggleReview() {
            active = !active;
            if (active) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#ff0000';
                canvas.classList.add('active');
                tools.style.display = 'flex';
                toggleBtn.classList.add('active');
                toggleBtn.textContent = '✏️ РЕЖИМ РАЗБОРА (ВКЛ)';
            } else {
                canvas.classList.remove('active');
                tools.style.display = 'none';
                toggleBtn.classList.remove('active');
                toggleBtn.textContent = '✏️ РЕЖИМ РАЗБОРА';
            }
        }

        toggleBtn.addEventListener('click', toggleReview);

        // Рисование мышью
        canvas.addEventListener('mousedown', function(e) {
            if (!active) return;
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
        });
        canvas.addEventListener('mousemove', function(e) {
            if (!active || !isDrawing) return;
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
        });
        canvas.addEventListener('mouseup', function() {
            isDrawing = false;
        });
        // Для касаний на мобильных
        canvas.addEventListener('touchstart', function(e) {
            if (!active) return;
            e.preventDefault();
            const touch = e.touches[0];
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(touch.clientX, touch.clientY);
        });
        canvas.addEventListener('touchmove', function(e) {
            if (!active || !isDrawing) return;
            e.preventDefault();
            const touch = e.touches[0];
            ctx.lineTo(touch.clientX, touch.clientY);
            ctx.stroke();
        });
        canvas.addEventListener('touchend', function() {
            isDrawing = false;
        });

        // Инициализация Fancybox
        Fancybox.bind('[data-fancybox]', {
            Carousel: { infinite: false },
            on: {
                closing: function() { 
                    if (active) toggleReview(); 
                    clearCanvas(); 
                },
                'Carousel.change': function() { 
                    clearCanvas(); 
                }
            }
        });
    </script>
</body>
</html>
